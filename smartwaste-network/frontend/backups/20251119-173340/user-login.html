<!doctype html>
<html>
<head>
  <meta charset='utf-8'/>
  <meta name='viewport' content='width=device-width,initial-scale=1'/>
  <title>User Login</title>
  <link rel='stylesheet' href='auth.css'>
</head>
<body>
  <div class='center-wrap'>
    <div class='card'>
      <h1>User Login</h1>
      <input id='user-email' class='input' placeholder='email' value='user@example.com'/>
      <input id='user-pass' type='password' class='input' placeholder='password' value='user123'/>
      <button id='user-login-btn' class='btn'>Login</button>
      <div id='user-msg'></div>
    </div>
  </div>

  <script src='login.js'></script>
  <script>
    document.getElementById('user-login-btn')
      .addEventListener('click', async ()=>{
        const email=document.getElementById('user-email').value;
        const pw=document.getElementById('user-pass').value;
        try{
          const data=await doLogin('/api/auth/login',email,pw);
          if(data.user.role!=='user'){document.getElementById('user-msg').textContent='Not a user';return;}
          window.location.href='user-dashboard.html';
        }catch(err){
          document.getElementById('user-msg').textContent=(err&&err.error)?err.error:'Login failed';
        }
      });
  </script>
</body>
</html>
