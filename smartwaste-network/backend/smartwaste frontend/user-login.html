<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>User Login — SmartWaste</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>
  <div class="center-wrap">
    <div class="card">
      <h1>SmartWaste — User Login</h1>

      <div class="form-row">
        <input id="email" class="input" placeholder="email" value="user@example.com"/>
        <input id="password" type="password" class="input" placeholder="password" value="user123"/>
      </div>

      <button id="loginBtn" class="btn">Sign in</button>
      <div id="msg" class="small"></div>
    </div>
  </div>


<script>
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  msg.textContent = "";

  try {
    const res = await fetch("/api/login", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      msg.textContent = data.error || "Login failed";
      return;
    }

    // 🔥 ROLE-BASED REDIRECT
    if (data.user.role === "admin") {
      window.location.href = "admin-dashboard.html";
    } else {
      window.location.href = "user-dashboard.html";
    }

  } catch (err) {
    msg.textContent = "Network error";
  }
});
</script>



</body>
</html>
